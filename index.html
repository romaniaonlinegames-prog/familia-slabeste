<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#2F5233">
<title>Familia Slăbește</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <span class="brand">🌿 Familia Slăbește</span>
    <div style="display:flex;align-items:center;gap:8px">
      <span id="sync-badge" class="sync-badge"></span>
      <button id="btn-notif" class="icon-btn" title="Notificări">🔔</button>
    </div>
  </div>
</header>

<div id="loading-screen" class="loading-screen">
  <div class="loading-inner">
    <div class="big">🌿</div>
    <p>Se conectează…</p>
    <button id="loading-skip" class="btn btn-outline" style="display:none;margin-top:14px">Continuă fără sincronizare</button>
  </div>
</div>

<main id="app-content" class="app-content"></main>

<nav class="bottom-nav">
  <button class="nav-item" data-tab="azi"><span class="nav-icon">📅</span><span>Azi</span></button>
  <button class="nav-item" data-tab="meniu"><span class="nav-icon">🍲</span><span>Meniu</span></button>
  <button class="nav-item" data-tab="cumparaturi"><span class="nav-icon">🛒</span><span>Cumpărături</span></button>
  <button class="nav-item" data-tab="progres"><span class="nav-icon">📈</span><span>Progres</span></button>
  <button class="nav-item" data-tab="profil"><span class="nav-icon">👪</span><span>Familia</span></button>
</nav>

<div id="toast" class="toast"></div>

<script src="js/data.js"></script>
<script src="js/calc.js"></script>
<script src="js/notifications.js"></script>
<script src="js/pedometer.js"></script>
<script type="module" src="js/sync.js"></script>
<script src="js/storage.js"></script>
<script src="js/app.js"></script>
</body>
</html>
